function buildPlan(){
const p={};
DAYS.forEach((d,i)=>{
const src=DAY_TYPES[i]===“high”?HIGH_M:LOW_M;
p[d]=JSON.parse(JSON.stringify(src)).map(m=>({…m,id:`${d}-${m.id}`,items:m.items.map(it=>({…it,id:`${d}-${m.id}-${it.id}`}))}));
});
return p;
}
function uid(){return Math.random().toString(36).slice(2,9)}

// ─── STORAGE HOOK ─────────────────────────────────────────────────────────────
function useLS(key,init){
const[v,setV]=useState(()=>{
try{const s=localStorage.getItem(key);return s?JSON.parse(s):(typeof init===‘function’?init():init)}catch{return typeof init===‘function’?init():init}
});
const set=useCallback(val=>{
try{const s=typeof val===‘function’?val(v):val;setV(s);localStorage.setItem(key,JSON.stringify(s))}catch{}
},[key,v]);
return[v,set];
}

// ─── AI FOOD LOOKUP ───────────────────────────────────────────────────────────
async function lookupFood(q){
const r=await fetch(“https://api.anthropic.com/v1/messages”,{
method:“POST”,headers:{“Content-Type”:“application/json”},
body:JSON.stringify({model:“claude-sonnet-4-20250514”,max_tokens:300,
system:`You are a nutrition database. Return ONLY raw JSON, no markdown: {"name":"string","cal":number,"carbs":number,"protein":number,"fat":number} Use realistic USDA values. All macros in grams.`,
messages:[{role:“user”,content:`Food: ${q}`}]}),
});
const d=await r.json();
const t=d.content?.map(b=>b.text||””).join(””)||””;
return JSON.parse(t.replace(/`json|`/g,””).trim());
}

// ─── UI PRIMITIVES ────────────────────────────────────────────────────────────
function MacroBar({label,val,target,color}){
const pct=Math.min(100,Math.round((val/target)*100));
const over=val>target;
return(
<div style={{marginBottom:7}}>
<div style={{display:‘flex’,justifyContent:‘space-between’,marginBottom:3}}>
<span style={{fontSize:10,fontFamily:C.mono,letterSpacing:‘0.1em’,color:C.dim,textTransform:‘uppercase’}}>{label}</span>
<span style={{fontSize:10,fontFamily:C.mono,color:over?C.red:color}}>{val}<span style={{color:C.faint}}>/{target}</span>{label!==‘Cal’?‘g’:’’}</span>
</div>
<div style={{height:3,background:’#0f0d08’,borderRadius:2,overflow:‘hidden’}}>
<div style={{height:‘100%’,width:`${pct}%`,background:over?C.red:color,borderRadius:2,transition:‘width 0.4s ease’}}/>
</div>
</div>
);
}

function SL({children}){

// ─── FOOD SEARCH ──────────────────────────────────────────────────────────────
function FoodSearch({onAdd,onClose}){

async function search(){
if(!q.trim())return;setL(true);setE(’’);setR(null);
try{setR(await lookupFood(q))}catch{setE(“Couldn’t find that. Try being more specific.”)}finally{setL(false)}
}
return(
<div style={{padding:‘14px 16px’,background:’#0a0806’,borderTop:`1px solid ${C.border}`}}>
<SL>Search Food</SL>
<div style={{display:‘flex’,gap:8,marginBottom:10}}>
<input autoFocus value={q} onChange={e=>setQ(e.target.value)} onKeyDown={e=>e.key===‘Enter’&&search()}
placeholder=’“6 oz mahi mahi” or “1 cup quinoa”’
style={{flex:1,background:’#080604’,border:`1px solid ${C.border2}`,borderRadius:8,padding:‘9px 12px’,color:C.mid,fontSize:12,fontFamily:C.mono,outline:‘none’}}/>

</div>
{err&&<div style={{fontSize:11,color:C.red,fontFamily:C.mono,marginBottom:8}}>{err}</div>}
{result&&(
<div style={{background:’#080604’,border:`1px solid ${C.border2}`,borderRadius:10,padding:12}}>
<div style={{fontSize:13,color:C.text,marginBottom:10}}>{result.name}</div>

{[[‘Cal’,result.cal,C.gold],[‘Carbs’,`${result.carbs}g`,C.orange],[‘Protein’,`${result.protein}g`,C.blue],[‘Fat’,`${result.fat}g`,’#806040’]].map(([l,v2,col])=>(

<div style={{fontSize:15,color:col}}>{v2}</div>
<div style={{fontSize:9,color:C.faint,fontFamily:C.mono,textTransform:‘uppercase’,marginTop:2}}>{l}</div>

))}
</div>

</div>
</div>
)}

}

// ─── ITEM EDITOR ──────────────────────────────────────────────────────────────
function ItemEditor({item,onSave,onDelete,onCancel}){
const[name,setName]=useState(item.name);const[cal,setCal]=useState(item.cal);
const[carbs,setCarbs]=useState(item.carbs);const[protein,setProtein]=useState(item.protein);
const[fat,setFat]=useState(item.fat);const[loading,setL]=useState(false);
async function autoFill(){
if(!name.trim()||name===item.name)return;setL(true);
try{const f=await lookupFood(name);setName(f.name);setCal(f.cal);setCarbs(f.carbs);setProtein(f.protein);setFat(f.fat)}catch{}
setL(false);
}
const n=v=>parseInt(v)||0;
return(
<div style={{background:’#0d0a06’,border:`1px solid ${C.border2}`,borderRadius:10,padding:12,margin:‘6px 0’}}>
<input value={name} onChange={e=>setName(e.target.value)} onBlur={autoFill}
placeholder=“Food name — blur to auto-fill macros”
style={{width:‘100%’,boxSizing:‘border-box’,background:’#080604’,border:`1px solid ${C.border2}`,borderRadius:7,padding:‘8px 10px’,color:C.text,fontSize:12,fontFamily:C.mono,outline:‘none’,marginBottom:8}}/>
{loading&&<div style={{fontSize:10,color:C.gold,fontFamily:C.mono,marginBottom:6}}>Looking up macros…</div>}
<div style={{display:‘grid’,gridTemplateColumns:‘repeat(4,1fr)’,gap:6,marginBottom:10}}>
{[[‘Cal’,cal,setCal,C.gold],[‘Carbs’,carbs,setCarbs,C.orange],[‘Protein’,protein,setProtein,C.blue],[‘Fat’,fat,setFat,’#806040’]].map(([l,v2,sv,col])=>(
<div key={l}>
<div style={{fontSize:9,fontFamily:C.mono,color:col,textTransform:‘uppercase’,letterSpacing:‘0.1em’,marginBottom:3}}>{l}</div>
<input type=“number” value={v2} onChange={e=>sv(n(e.target.value))}
style={{width:‘100%’,boxSizing:‘border-box’,background:’#080604’,border:`1px solid ${C.border}`,borderRadius:6,padding:‘6px 7px’,color:col,fontSize:12,fontFamily:C.mono,outline:‘none’}}/>
</div>

<Btn onClick={()=>onSave({name,cal:n(cal),carbs:n(carbs),protein:n(protein),fat:n(fat)})} v=‘primary’ style={{flex:1}}>Save</Btn>
<Btn onClick={onDelete} v='danger'>Del</Btn>
<Btn onClick={onCancel} v='ghost'>✕</Btn>
</div>
</div>
);
}

const mt=m=>m.items.reduce((a,it)=>({cal:a.cal+it.cal,carbs:a.carbs+it.carbs,protein:a.protein+it.protein,fat:a.fat+it.fat}),{cal:0,carbs:0,protein:0,fat:0});
const updItem=useCallback((mid,iid,u)=>setPlan(p=>({…p,[dl]:p[dl].map(m=>m.id===mid?{…m,items:m.items.map(it=>it.id===iid?{…it,…u}:it)}:m)})),[dl,setPlan]);
const delItem=useCallback((mid,iid)=>setPlan(p=>({…p,[dl]:p[dl].map(m=>m.id===mid?{…m,items:m.items.filter(it=>it.id!==iid)}:m)})),[dl,setPlan]);
const addItem=useCallback((mid,food)=>setPlan(p=>({…p,[dl]:p[dl].map(m=>m.id===mid?{…m,items:[…m.items,{…food,id:`${dl}-${mid}-${uid()}`}]}:m)})),[dl,setPlan]);

{DAYS.map((d,i)=>{
const sel=selDay===i;const hi=DAY_TYPES[i]===‘high’;

// ─── PROGRESS TRACKER ─────────────────────────────────────────────────────────
function WeightChart({entries}){
if(entries.length<2)return null;
const vals=entries.map(e=>e.weight);
const min=Math.min(…vals)-2,max=Math.max(…vals)+2;
const W=Math.max(300,entries.length*44),H=90;
const xS=W/(entries.length-1);
const yS=v=>H-((v-min)/(max-min))*H;
const pts=entries.map((e,i)=>({x:i*xS,y:yS(e.weight)}));
const path=pts.map((p,i)=>`${i===0?'M':'L'}${p.x.toFixed(1)},${p.y.toFixed(1)}`).join(’ ’);
const gY=yS(PROFILE.goalWeight);
return(
<div style={{overflowX:‘auto’}}>
<svg width={W} height={H+28} style={{display:‘block’}}>
<line x1={0} y1={gY} x2={W} y2={gY} stroke='#1a3a1a' strokeWidth={1} strokeDasharray="4,4"/>
<text x={4} y={gY-4} fill='#2a5a2a' fontSize={8} fontFamily={C.mono}>GOAL 178</text>
<path d={path} fill='none' stroke={C.gold} strokeWidth={2} strokeLinecap='round' strokeLinejoin='round'/>
{pts.map((p,i)=><circle key={i} cx={p.x} cy={p.y} r={3} fill={C.gold}/>)}
{entries.map((e,i)=><text key={i} x={i*xS} y={H+20} fill={C.faint} fontSize={8} fontFamily={C.mono} textAnchor='middle'>
{new Date(e.date+‘T12:00’).toLocaleDateString(‘en-US’,{month:‘numeric’,day:‘numeric’})}
</text>)}
</svg>
</div>
);
}

function ProgressTracker(){
const[entries,setEntries]=useLS(‘mmp-weight’,[]);
const[w,setW]=useState(’’);const[note,setNote]=useState(’’);const[showAll,setSA]=useState(false);
const today=new Date().toISOString().slice(0,10);
const hasToday=entries.some(e=>e.date===today);
function add(){
const wt=parseFloat(w);if(!wt||wt<100||wt>400)return;
const entry={id:Date.now(),date:today,weight:wt,note:note.trim()};
const sorted=[…entries.filter(e=>e.date!==today),entry].sort((a,b)=>a.date.localeCompare(b.date));
setEntries(sorted);setW(’’);setNote(’’);
}
const latest=entries.length?entries[entries.length-1]:null;
const lost=latest?+(PROFILE.startWeight-latest.weight).toFixed(1):0;
const rem=latest?+(latest.weight-PROFILE.goalWeight).toFixed(1):PROFILE.startWeight-PROFILE.goalWeight;
const pct=Math.min(100,Math.round((lost/(PROFILE.startWeight-PROFILE.goalWeight))*100));
const disp=showAll?[…entries].reverse():[…entries].reverse().slice(0,8);
return(

{[[‘Current’,latest?`${latest.weight}`:PROFILE.startWeight,‘lbs’,C.gold],[‘Lost’,lost>0?`-${lost}`:‘0’,‘lbs’,C.green],[‘To Go’,rem,‘lbs’,C.orange]].map(([l,v,u,col])=>(
<div key={l} style={{background:C.surf,border:`1px solid ${C.border}`,borderRadius:12,padding:‘12px 10px’,textAlign:‘center’}}>

</div>
))}
</div>
<div style={{background:C.surf,border:`1px solid ${C.border}`,borderRadius:12,padding:‘14px 16px’,marginBottom:16}}>
<div style={{display:‘flex’,justifyContent:‘space-between’,marginBottom:8}}>
<span style={{fontSize:10,fontFamily:C.mono,color:C.dim,letterSpacing:‘0.1em’,textTransform:‘uppercase’}}>Journey to 178</span>
<span style={{fontSize:10,fontFamily:C.mono,color:C.gold}}>{pct}%</span>
</div>
<div style={{height:6,background:’#0f0d08’,borderRadius:3,overflow:‘hidden’}}>
<div style={{height:‘100%’,width:`${pct}%`,background:`linear-gradient(90deg,${C.gold},#e0a040)`,borderRadius:3,transition:‘width 0.5s ease’}}/>
</div>
<div style={{display:‘flex’,justifyContent:‘space-between’,marginTop:6}}>
<span style={{fontSize:9,fontFamily:C.mono,color:C.faint}}>208 lbs</span>
<span style={{fontSize:9,fontFamily:C.mono,color:C.faint}}>178 lbs</span>
</div>
</div>
{entries.length>=2&&(
<div style={{background:C.surf,border:`1px solid ${C.border}`,borderRadius:12,padding:‘14px 16px’,marginBottom:16}}>
<SL>Weight Trend</SL>
<WeightChart entries={entries}/>
</div>
)}
<div style={{background:C.surf,border:`1px solid ${C.border}`,borderRadius:12,padding:‘14px 16px’,marginBottom:16}}>
<SL>{hasToday?“Update Today’s Weight”:“Log Today’s Weight”}</SL>
<div style={{display:‘flex’,gap:8,marginBottom:8}}>
<input type=“number” value={w} onChange={e=>setW(e.target.value)} placeholder=“lbs” step=“0.1”
style={{width:90,background:’#080604’,border:`1px solid ${C.border2}`,borderRadius:8,padding:‘10px 12px’,color:C.text,fontSize:16,fontFamily:C.mono,outline:‘none’,textAlign:‘center’}}/>
<input value={note} onChange={e=>setNote(e.target.value)} placeholder=“Note (optional)”
style={{flex:1,background:’#080604’,border:`1px solid ${C.border2}`,borderRadius:8,padding:‘10px 12px’,color:C.mid,fontSize:12,fontFamily:C.mono,outline:‘none’}}/>

</div>
{entries.length>0&&(
<div style={{background:C.surf,border:`1px solid ${C.border}`,borderRadius:12,padding:‘14px 16px’,marginBottom:16}}>

{disp.map((e,i)=>{

const WT=[
{id:‘strength’,label:‘Strength’,emoji:‘🏋️’,color:’#4080c0’},

{id:‘rest’,label:‘Rest Day’,emoji:‘😴’,color:C.dim},
];
const INTENS=[‘Easy’,‘Moderate’,‘Hard’,‘Max’];

function WorkoutLogger(){
const[logs,setLogs]=useLS(‘mmp-workouts’,[]);
const[type,setType]=useState(‘strength’);const[intens,setIntens]=useState(1);
const[dur,setDur]=useState(’’);const[notes,setNotes]=useState(’’);const[showAll,setSA]=useState(false);
const today=new Date().toISOString().slice(0,10);
const todayLog=logs.find(l=>l.date===today);
function log(){
const e={id:Date.now(),date:today,type,intensity:intens,duration:parseInt(dur)||0,notes:notes.trim()};
const s=[…logs.filter(l=>l.date!==today),e].sort((a,b)=>a.date.localeCompare(b.date));
setLogs(s);setNotes(’’);
}
const weekDates=DAYS.map((_,i)=>{
const d=new Date();const jd=d.getDay();const off=jd===0?-6:1-jd;
const nd=new Date(d);nd.setDate(d.getDate()+off+i);return nd.toISOString().slice(0,10);
});
const streak=(()=>{
let s=0;const sorted=[…logs].sort((a,b)=>b.date.localeCompare(a.date));
for(const l of sorted){if(l.type===‘rest’)continue;const ex=new Date();ex.setDate(ex.getDate()-s);if(l.date===ex.toISOString().slice(0,10))s++;else break;}
return s;
})();
const total=logs.filter(l=>l.type!==‘rest’).length;

const wt2=WT.find(w=>w.id===type);
return(

<div style={{display:‘grid’,gridTemplateColumns:‘repeat(3,1fr)’,gap:8,marginBottom:16}}>
{[[‘Streak’,streak,‘days’,C.gold],[‘Total’,total,‘sessions’,C.blue],[‘This Wk’,wkTotal,’/7’,C.green]].map(([l,v,u,col])=>(
<div key={l} style={{background:C.surf,border:`1px solid ${C.border}`,borderRadius:12,padding:‘12px 10px’,textAlign:‘center’}}>

<div style={{fontSize:9,fontFamily:C.mono,color:C.faint,textTransform:‘uppercase’,letterSpacing:‘0.1em’,marginTop:3}}>{l}</div>
</div>
))}
</div>
{/* Weekly strip */}
<div style={{background:C.surf,border:`1px solid ${C.border}`,borderRadius:12,padding:‘14px 16px’,marginBottom:16}}>
<SL>This Week</SL>
<div style={{display:‘grid’,gridTemplateColumns:‘repeat(7,1fr)’,gap:5}}>
{DAYS.map((d,i)=>{
const date=weekDates[i];const lg=logs.find(l=>l.date===date);
const hi=DAY_TYPES[i]===‘high’;const isT=date===today;
const wtype=WT.find(w=>w.id===lg?.type);
return(
<div key={d} style={{textAlign:‘center’}}>
<div style={{fontSize:8,fontFamily:C.mono,color:isT?C.gold:C.faint,letterSpacing:‘0.05em’,marginBottom:4}}>{d}</div>
<div style={{width:‘100%’,paddingBottom:‘100%’,position:‘relative’,borderRadius:8,
background:lg?(lg.type===‘rest’?’#141008’:’#0a1a0a’):’#0c0a06’,
border:`1px solid ${lg?(lg.type==='rest'?'#2a2008':'#1a3a1a'):isT?C.border2:C.border}`}}>
<div style={{position:‘absolute’,inset:0,display:‘flex’,alignItems:‘center’,justifyContent:‘center’,fontSize:14}}>
{lg?wtype?.emoji:(hi?‘🔥’:’’)}
</div>
</div>
{hi&&!lg&&<div style={{fontSize:7,fontFamily:C.mono,color:’#502010’,marginTop:2,letterSpacing:‘0.05em’}}>HI-C</div>}
</div>
);
})}
</div>
</div>
{/* Log */}
<div style={{background:C.surf,border:`1px solid ${C.border}`,borderRadius:12,padding:‘14px 16px’,marginBottom:16}}>

))}

{type!==‘rest’&&(
<>
<div style={{marginBottom:10}}>
<div style={{fontSize:9,fontFamily:C.mono,color:C.faint,letterSpacing:‘0.12em’,textTransform:‘uppercase’,marginBottom:6}}>Intensity</div>
<div style={{display:‘grid’,gridTemplateColumns:‘repeat(4,1fr)’,gap:5}}>
{INTENS.map((s,idx)=>(
<button key={s} onClick={()=>setIntens(idx)} style={{background:intens===idx?’#0a1a0a’:‘transparent’,border:`1px solid ${intens===idx?C.green:C.border}`,borderRadius:7,padding:‘7px 4px’,cursor:‘pointer’,fontSize:10,fontFamily:C.mono,color:intens===idx?C.green:C.faint,letterSpacing:‘0.06em’}}>{s}</button>

</div>
<div style={{marginBottom:10}}>

</div>
</>
)}

{logs.length>0&&(
<div style={{background:C.surf,border:`1px solid ${C.border}`,borderRadius:12,padding:‘14px 16px’,marginBottom:16}}>
<SL>History</SL>
{disp.map(lg=>{
const wt3=WT.find(w=>w.id===lg.type);const isT=lg.date===today;
return(
<div key={lg.id} style={{display:‘flex’,alignItems:‘center’,gap:10,padding:‘9px 0’,borderBottom:`1px solid ${C.border}`}}>
<span style={{fontSize:20}}>{wt3?.emoji}</span>
<div style={{flex:1}}>

</div>
)}
<div style={{height:20}}/>
</div>
);
}
