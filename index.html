<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black"/>
<meta name="apple-mobile-web-app-title" content="My Macros"/>
<title>My Macro Planner</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{background:#080604;color:#e8e0d0;font-family:'DM Mono',monospace;overscroll-behavior:none;min-height:100vh}
button{cursor:pointer;font-family:'DM Mono',monospace}
input,textarea{font-family:'DM Mono',monospace}
input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none}
::-webkit-scrollbar{display:none}
.app{max-width:500px;margin:0 auto;min-height:100vh;background:#080604}
.header{position:sticky;top:0;z-index:100;background:rgba(8,6,4,0.97);border-bottom:1px solid #181410;padding:14px 20px}
.header-inner{display:flex;justify-content:space-between;align-items:center}
.app-name{font-size:9px;letter-spacing:0.22em;color:#604020;text-transform:uppercase;margin-bottom:3px}
.app-title{font-size:20px;color:#e8e0d0;letter-spacing:-0.02em}
.target-label{font-size:9px;color:#2a2010;text-transform:uppercase;letter-spacing:0.1em;text-align:right}
.target-val{font-size:16px;color:#a07830}
.content{padding-bottom:80px}
.bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:500px;background:rgba(8,6,4,0.98);border-top:1px solid #181410;display:grid;grid-template-columns:repeat(3,1fr)}
.nav-btn{background:transparent;border:none;padding:14px 8px 12px;display:flex;flex-direction:column;align-items:center;gap:4}
.nav-icon{font-size:20px}
.nav-label{font-size:9px;letter-spacing:0.12em;text-transform:uppercase}
.nav-dot{width:16px;height:2px;background:#a07830;border-radius:1px;margin-top:2px}
.section-pad{padding:16px 16px 0}
.card{background:#0c0a06;border:1px solid #181410;border-radius:14px;overflow:hidden}
.section-label{font-size:9px;letter-spacing:0.22em;color:#2a2010;text-transform:uppercase;margin-bottom:10px}
.stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:16px}
.stat-card{background:#0c0a06;border:1px solid #181410;border-radius:12px;padding:12px 10px;text-align:center}
.stat-val{font-size:22px;letter-spacing:-0.02em}
.stat-unit{font-size:11px;color:#2a2010}
.stat-label{font-size:9px;color:#2a2010;text-transform:uppercase;letter-spacing:0.1em;margin-top:3px}
</style>
</head>
<body>
<div id="root"><div style="color:#a07830;text-align:center;padding:40px;font-family:monospace">Loading My Macro Planner…</div></div>

<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>

<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>

<script>
(function(){
const {createElement:h,useState,useCallback,Fragment}=React;

// ── Constants ──────────────────────────────────────────────────────────────
const DAYS=["MON","TUE","WED","THU","FRI","SAT","SUN"];
const DTYPES=["low","low","low","high","low","low","high"];
const TARGETS={
  low:{cal:1950,carbs:50,protein:175,fat:120},
  high:{cal:2200,carbs:225,protein:175,fat:50}
};

const LOW_M=[
  {id:"m1",time:"7:00 AM",label:"Breakfast",emoji:"🍳",items:[
    {id:"i1",name:"3 whole eggs + 3 egg whites in olive oil",cal:320,carbs:2,protein:36,fat:20},
    {id:"i2",name:"1 cup sautéed spinach + mushrooms",cal:60,carbs:6,protein:4,fat:2}]},
  {id:"m2",time:"12:00 PM",label:"Lunch",emoji:"🐟",items:[
    {id:"i3",name:"6 oz grilled salmon",cal:280,carbs:0,protein:40,fat:14},
    {id:"i4",name:"2 cups mixed greens + ½ avocado",cal:160,carbs:8,protein:4,fat:12},
    {id:"i5",name:"½ cup edamame",cal:90,carbs:7,protein:8,fat:4}]},
  {id:"m3",time:"3:30 PM",label:"Snack",emoji:"🥛",items:[
    {id:"i6",name:"1 cup full-fat Greek yogurt",cal:200,carbs:8,protein:18,fat:11},
    {id:"i7",name:"15 almonds",cal:104,carbs:4,protein:4,fat:9}]},
  {id:"m4",time:"7:00 PM",label:"Dinner",emoji:"🦐",items:[
    {id:"i8",name:"6 oz seared tilapia",cal:218,carbs:0,protein:44,fat:4},
    {id:"i9",name:"2 cups roasted broccoli + zucchini",cal:180,carbs:14,protein:6,fat:10},
    {id:"i10",name:"½ cup cauliflower rice",cal:28,carbs:5,protein:2,fat:0},
    {id:"i11",name:"½ avocado",cal:120,carbs:6,protein:2,fat:11}]},
  {id:"m5",time:"9:30 PM",label:"Evening",emoji:"🥚",items:[
    {id:"i12",name:"2 hard boiled eggs",cal:140,carbs:1,protein:12,fat:10},
    {id:"i13",name:"1 tbsp almond butter",cal:98,carbs:3,protein:4,fat:9}]}
];

const HIGH_M=[
  {id:"m1",time:"7:00 AM",label:"Breakfast",emoji:"🥣",items:[
    {id:"i1",name:"3 whole eggs scrambled",cal:210,carbs:1,protein:18,fat:14},
    {id:"i2",name:"1 cup oatmeal with ½ banana",cal:220,carbs:46,protein:6,fat:3}]},
  {id:"m2",time:"11:30 AM",label:"Pre-Workout",emoji:"⚡",items:[
    {id:"i3",name:"1 cup low-fat Greek yogurt",cal:130,carbs:9,protein:18,fat:0},
    {id:"i4",name:"1 medium apple",cal:95,carbs:25,protein:0,fat:0},
    {id:"i5",name:"1 rice cake with honey",cal:95,carbs:23,protein:1,fat:0}]},
  {id:"m3",time:"2:00 PM",label:"Post-Workout",emoji:"🍚",items:[
    {id:"i6",name:"6 oz grilled shrimp",cal:168,carbs:2,protein:34,fat:2},
    {id:"i7",name:"1 cup jasmine rice",cal:206,carbs:45,protein:4,fat:0},
    {id:"i8",name:"1 cup broccoli + snap peas",cal:80,carbs:14,protein:5,fat:1}]},
  {id:"m4",time:"5:00 PM",label:"Snack",emoji:"🫙",items:[
    {id:"i9",name:"¾ cup cottage cheese",cal:148,carbs:6,protein:20,fat:3},
    {id:"i10",name:"½ cup mixed berries",cal:42,carbs:10,protein:1,fat:0}]},
  {id:"m5",time:"7:30 PM",label:"Dinner",emoji:"🐠",items:[
    {id:"i11",name:"6 oz baked salmon",cal:280,carbs:0,protein:40,fat:14},
    {id:"i12",name:"1 medium sweet potato",cal:103,carbs:24,protein:2,fat:0},
    {id:"i13",name:"Large side salad",cal:80,carbs:10,protein:2,fat:3}]}
];

function buildPlan(){
  const p={};
  DAYS.forEach((d,i)=>{
    const src=DTYPES[i]==="high"?HIGH_M:LOW_M;
    p[d]=JSON.parse(JSON.stringify(src)).map(m=>({
      ...m,id:d+"-"+m.id,
      items:m.items.map(it=>({...it,id:d+"-"+m.id+"-"+it.id}))
    }));
  });
  return p;
}

function uid(){return Math.random().toString(36).slice(2,9)}

// ── localStorage hook ──────────────────────────────────────────────────────
function useLS(key,init){
  const[v,setV]=useState(()=>{
    try{const s=localStorage.getItem(key);return s?JSON.parse(s):(typeof init==='function'?init():init)}
    catch(e){return typeof init==='function'?init():init}
  });
  const set=useCallback((val)=>{
    try{
      const s=typeof val==='function'?val(v):val;
      setV(s);
      localStorage.setItem(key,JSON.stringify(s));
    }catch(e){}
  },[key,v]);
  return[v,set];
}

// ── AI food lookup ─────────────────────────────────────────────────────────
async function lookupFood(q){
  const r=await fetch("https://api.anthropic.com/v1/messages",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      model:"claude-sonnet-4-20250514",
      max_tokens:200,
      system:'Return ONLY a JSON object, no markdown, no extra text: {"name":"string","cal":number,"carbs":number,"protein":number,"fat":number}. Use USDA nutritional values.',
      messages:[{role:"user",content:"Food: "+q}]
    })
  });
  const d=await r.json();
  const t=(d.content||[]).map(b=>b.text||"").join("").replace(/```json|```/g,"").trim();
  return JSON.parse(t);
}

// ── Shared Components ──────────────────────────────────────────────────────
function MacroBar({label,val,target,color}){
  const pct=Math.min(100,Math.round(val/target*100));
  const over=val>target;
  return h('div',{style:{marginBottom:7}},
    h('div',{style:{display:'flex',justifyContent:'space-between',marginBottom:3}},
      h('span',{style:{fontSize:10,letterSpacing:'0.1em',color:'#504030',textTransform:'uppercase'}},label),
      h('span',{style:{fontSize:10,color:over?'#e05030':color}},
        val,h('span',{style:{color:'#2a2010'}},'/'+target),label!=='Cal'?'g':'')
    ),
    h('div',{style:{height:3,background:'#0f0d08',borderRadius:2,overflow:'hidden'}},
      h('div',{style:{height:'100%',width:pct+'%',background:over?'#e05030':color,borderRadius:2,transition:'width 0.4s'}})
    )
  );
}

function SLabel({text}){
  return h('div',{style:{fontSize:9,letterSpacing:'0.22em',color:'#2a2010',textTransform:'uppercase',marginBottom:10}},text);
}

function ActionBtn({label,onClick,color,bg,border,flex}){
  return h('button',{
    onClick,
    style:{
      flex:flex||undefined,
      background:bg||'transparent',
      border:'1px solid '+(border||'#221e14'),
      borderRadius:8,padding:'8px 14px',
      color:color||'#504030',
      fontSize:10,letterSpacing:'0.12em',
      textTransform:'uppercase',cursor:'pointer'
    }
  },label);
}

// ── Food Search ────────────────────────────────────────────────────────────
function FoodSearch({onAdd,onClose}){
  const[q,setQ]=useState('');
  const[loading,setL]=useState(false);
  const[result,setR]=useState(null);
  const[err,setE]=useState('');

  async function search(){
    if(!q.trim())return;
    setL(true);setE('');setR(null);
    try{setR(await lookupFood(q))}
    catch{setE("Couldn't find that. Try being more specific.")}
    finally{setL(false)}
  }

  return h('div',{style:{padding:'14px 16px',background:'#0a0806',borderTop:'1px solid #181410'}},
    h(SLabel,{text:'Search Food'}),
    h('div',{style:{display:'flex',gap:8,marginBottom:10}},
      h('input',{
        autoFocus:true,value:q,
        onChange:ev=>setQ(ev.target.value),
        onKeyDown:ev=>ev.key==='Enter'&&search(),
        placeholder:'"6 oz tuna" or "1 cup rice"',
        style:{flex:1,background:'#080604',border:'1px solid #221e14',borderRadius:8,
          padding:'9px 12px',color:'#a09070',fontSize:12,outline:'none'}
      }),
      h('button',{
        onClick:search,
        style:{background:'#1a1000',border:'1px solid #4a2800',borderRadius:8,
          padding:'9px 14px',color:'#a07830',fontSize:11,cursor:'pointer',letterSpacing:'0.1em'}
      },loading?'…':'Find')
    ),
    err&&h('div',{style:{fontSize:11,color:'#e05030',marginBottom:8}},err),
    result&&h('div',{style:{background:'#080604',border:'1px solid #221e14',borderRadius:10,padding:12}},
      h('div',{style:{fontSize:13,color:'#e8e0d0',marginBottom:10}},result.name),
      h('div',{style:{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:4,marginBottom:12}},
        [['Cal',result.cal,'#a07830'],['Carbs',result.carbs+'g','#d06010'],['Protein',result.protein+'g','#4080c0'],['Fat',result.fat+'g','#806040']].map(([l,v,col])=>
          h('div',{key:l,style:{textAlign:'center'}},
            h('div',{style:{fontSize:15,color:col}},v),
            h('div',{style:{fontSize:9,color:'#2a2010',textTransform:'uppercase',marginTop:2}},l)
          )
        )
      ),
      h('div',{style:{display:'flex',gap:8}},
        h('button',{
          onClick:()=>{onAdd(result);onClose()},
          style:{flex:1,background:'#122a0a',border:'1px solid #1e4a10',borderRadius:8,
            padding:8,color:'#50c040',fontSize:10,cursor:'pointer',letterSpacing:'0.1em'}
        },'+ ADD TO MEAL'),
        h('button',{
          onClick:onClose,
          style:{background:'transparent',border:'1px solid #221e14',borderRadius:8,
            padding:'8px 12px',color:'#504030',fontSize:10,cursor:'pointer'}
        },'✕')
      )
    )
  );
}

// ── Item Editor ────────────────────────────────────────────────────────────
function ItemEditor({item,onSave,onDelete,onCancel}){
  const[name,setName]=useState(item.name);
  const[cal,setCal]=useState(item.cal);
  const[carbs,setCarbs]=useState(item.carbs);
  const[protein,setProtein]=useState(item.protein);
  const[fat,setFat]=useState(item.fat);
  const[loading,setL]=useState(false);
  const n=v=>parseInt(v)||0;

  async function autoFill(){
    if(!name.trim()||name===item.name)return;
    setL(true);
    try{
      const f=await lookupFood(name);
      setName(f.name);setCal(f.cal);setCarbs(f.carbs);setProtein(f.protein);setFat(f.fat);
    }catch{}
    setL(false);
  }

  return h('div',{style:{background:'#0d0a06',border:'1px solid #221e14',borderRadius:10,padding:12,margin:'6px 0'}},
    h('input',{
      value:name,onChange:ev=>setName(ev.target.value),onBlur:autoFill,
      placeholder:"Food name — blur to auto-fill macros",
      style:{width:'100%',background:'#080604',border:'1px solid #221e14',borderRadius:7,
        padding:'8px 10px',color:'#e8e0d0',fontSize:12,outline:'none',marginBottom:8,boxSizing:'border-box'}
    }),
    loading&&h('div',{style:{fontSize:10,color:'#a07830',marginBottom:6}},'Looking up macros…'),
    h('div',{style:{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:6,marginBottom:10}},
      [['Cal',cal,setCal,'#a07830'],['Carbs',carbs,setCarbs,'#d06010'],['Protein',protein,setProtein,'#4080c0'],['Fat',fat,setFat,'#806040']].map(([l,v,sv,col])=>
        h('div',{key:l},
          h('div',{style:{fontSize:9,color:col,textTransform:'uppercase',letterSpacing:'0.1em',marginBottom:3}},l),
          h('input',{
            type:'number',value:v,onChange:ev=>sv(n(ev.target.value)),
            style:{width:'100%',background:'#080604',border:'1px solid #181410',borderRadius:6,
              padding:'6px 7px',color:col,fontSize:12,outline:'none',boxSizing:'border-box'}
          })
        )
      )
    ),
    h('div',{style:{display:'flex',gap:6}},
      h('button',{
        onClick:()=>onSave({name,cal:n(cal),carbs:n(carbs),protein:n(protein),fat:n(fat)}),
        style:{flex:1,background:'#122a0a',border:'1px solid #1e4a10',borderRadius:8,padding:8,color:'#50c040',fontSize:10,cursor:'pointer',letterSpacing:'0.1em'}
      },'SAVE'),
      h('button',{
        onClick:onDelete,
        style:{background:'#1a0808',border:'1px solid #3a1010',borderRadius:8,padding:'8px 12px',color:'#c03020',fontSize:10,cursor:'pointer'}
      },'DEL'),
      h('button',{
        onClick:onCancel,
        style:{background:'transparent',border:'1px solid #221e14',borderRadius:8,padding:'8px 12px',color:'#504030',fontSize:10,cursor:'pointer'}
      },'✕')
    )
  );
}

// ── Meal Planner ───────────────────────────────────────────────────────────
function MealPlanner(){
  const todayIdx=()=>{const j=new Date().getDay();return j===0?6:j-1};
  const[selDay,setSelDay]=useState(todayIdx);
  const[plan,setPlan]=useLS('mmp-plan',buildPlan);
  const[expanded,setExp]=useState(null);
  const[searching,setSrch]=useState(null);
  const[editing,setEdit]=useState(null);

  const dl=DAYS[selDay];
  const isHigh=DTYPES[selDay]==='high';
  const meals=plan[dl]||[];
  const tgt=TARGETS[DTYPES[selDay]];

  const tot=meals.reduce((a,m)=>{
    m.items.forEach(it=>{a.cal+=it.cal;a.carbs+=it.carbs;a.protein+=it.protein;a.fat+=it.fat});
    return a;
  },{cal:0,carbs:0,protein:0,fat:0});

  const mt=m=>m.items.reduce((a,it)=>({
    cal:a.cal+it.cal,carbs:a.carbs+it.carbs,protein:a.protein+it.protein,fat:a.fat+it.fat
  }),{cal:0,carbs:0,protein:0,fat:0});

  const updItem=useCallback((mid,iid,u)=>setPlan(p=>({
    ...p,[dl]:p[dl].map(m=>m.id===mid?{...m,items:m.items.map(it=>it.id===iid?{...it,...u}:it)}:m)
  })),[dl,setPlan]);

  const delItem=useCallback((mid,iid)=>setPlan(p=>({
    ...p,[dl]:p[dl].map(m=>m.id===mid?{...m,items:m.items.filter(it=>it.id!==iid)}:m)
  })),[dl,setPlan]);

  const addItem=useCallback((mid,food)=>setPlan(p=>({
    ...p,[dl]:p[dl].map(m=>m.id===mid?{...m,items:[...m.items,{...food,id:dl+"-"+mid+"-"+uid()}]}:m)
  })),[dl,setPlan]);

  return h('div',{style:{paddingBottom:20}},
    // Day strip
    h('div',{style:{padding:'16px 16px 0'}},
      h('div',{style:{display:'grid',gridTemplateColumns:'repeat(7,1fr)',gap:5}},
        DAYS.map((d,i)=>{
          const sel=selDay===i;
          const hi=DTYPES[i]==='high';
          return h('button',{
            key:d,
            onClick:()=>{setSelDay(i);setExp(null);setSrch(null);setEdit(null)},
            style:{
              background:sel?(hi?'#1c0e04':'#0a1a0a'):'transparent',
              border:'1px solid '+(sel?(hi?'#6a3010':'#1a4a1a'):'#181410'),
              borderRadius:8,padding:'9px 3px',textAlign:'center'
            }
          },
            h('div',{style:{fontSize:9,letterSpacing:'0.05em',textTransform:'uppercase',
              color:sel?(hi?'#d06020':'#40b040'):'#2a2010',marginBottom:4}},d),
            h('div',{style:{width:5,height:5,borderRadius:'50%',margin:'0 auto',
              background:hi?(sel?'#e07020':'#2a1408'):(sel?'#30a030':'#0e180e')}})
          );
        })
      ),
      // Day badge
      h('div',{style:{marginTop:12}},
        h('div',{style:{
          display:'inline-flex',alignItems:'center',gap:7,
          background:isHigh?'#120800':'#060e06',
          border:'1px solid '+(isHigh?'#4a2006':'#0e2a0e'),
          borderRadius:20,padding:'5px 12px'
        }},
          h('div',{style:{width:7,height:7,borderRadius:'50%',background:isHigh?'#d06010':'#30a030'}}),
          h('span',{style:{fontSize:10,letterSpacing:'0.12em',color:isHigh?'#d06010':'#30a030',textTransform:'uppercase'}},
            isHigh?'High Carb — Train Today':'Low Carb Day')
        )
      )
    ),

    // Macro summary
    h('div',{style:{margin:'12px 16px 0',background:'#0c0a06',border:'1px solid #181410',borderRadius:14,padding:'14px 16px 10px'}},
      h('div',{style:{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:4,marginBottom:14}},
        [['Cal',tot.cal,tgt.cal,'#a07830'],
         ['Carbs',tot.carbs,tgt.carbs,isHigh?'#d06010':'#405040'],
         ['Protein',tot.protein,tgt.protein,'#4080c0'],
         ['Fat',tot.fat,tgt.fat,'#806040']
        ].map(([l,v,t,col])=>
          h('div',{key:l,style:{textAlign:'center'}},
            h('div',{style:{fontSize:18,color:v>t?'#e05030':col,letterSpacing:'-0.02em'}},
              v,h('span',{style:{fontSize:10,color:'#2a2010'}},'/'+t)),
            h('div',{style:{fontSize:9,color:'#2a2010',textTransform:'uppercase',letterSpacing:'0.08em',marginTop:2}},l)
          )
        )
      ),
      h(MacroBar,{label:'Cal',val:tot.cal,target:tgt.cal,color:'#a07830'}),
      h(MacroBar,{label:'Carbs',val:tot.carbs,target:tgt.carbs,color:isHigh?'#d06010':'#405040'}),
      h(MacroBar,{label:'Protein',val:tot.protein,target:tgt.protein,color:'#4080c0'}),
      h(MacroBar,{label:'Fat',val:tot.fat,target:tgt.fat,color:'#806040'})
    ),

    // Meals
    h('div',{style:{padding:'16px 16px 0',display:'flex',flexDirection:'column',gap:8}},
      h(SLabel,{text:'Meals — tap to expand · tap item to edit'}),
      meals.map(meal=>{
        const isOpen=expanded===meal.id;
        const isSrch=searching===meal.id;
        const m=mt(meal);
        return h('div',{
          key:meal.id,
          style:{
            background:isOpen?'#0f0d09':'#0c0a06',
            border:'1px solid '+(isOpen?'#221e14':'#181410'),
            borderRadius:14,overflow:'hidden'
          }
        },
          // Meal header
          h('button',{
            onClick:()=>{setExp(isOpen?null:meal.id);setSrch(null);setEdit(null)},
            style:{width:'100%',background:'transparent',border:'none',padding:'13px 15px',
              display:'flex',alignItems:'center',gap:10,textAlign:'left'}
          },
            h('span',{style:{fontSize:20}},meal.emoji),
            h('div',{style:{flex:1}},
              h('div',{style:{display:'flex',alignItems:'center',gap:8}},
                h('span',{style:{fontSize:14,color:'#e8e0d0'}},meal.label),
                h('span',{style:{fontSize:10,color:'#2a2010'}},meal.time)
              ),
              h('div',{style:{fontSize:10,color:'#504030',marginTop:1}},
                m.cal+'cal · '+m.protein+'g P · '+m.carbs+'g C · '+m.fat+'g F')
            ),
            h('span',{style:{color:'#2a2010',fontSize:12,
              transform:isOpen?'rotate(180deg)':'rotate(0)',transition:'transform 0.2s'}},'▾')
          ),

          // Expanded content
          isOpen&&h('div',null,
            h('div',{style:{height:1,background:'#181410'}}),
            // Items
            h('div',{style:{padding:'8px 14px 4px'}},
              meal.items.map(item=>{
                const ed=editing&&editing.mealId===meal.id&&editing.itemId===item.id;
                return ed
                  ? h(ItemEditor,{
                      key:item.id,item,
                      onSave:u=>{updItem(meal.id,item.id,u);setEdit(null)},
                      onDelete:()=>{delItem(meal.id,item.id);setEdit(null)},
                      onCancel:()=>setEdit(null)
                    })
                  : h('div',{
                      key:item.id,
                      onClick:()=>setEdit({mealId:meal.id,itemId:item.id}),
                      style:{display:'flex',alignItems:'center',gap:8,padding:'7px 0',
                        borderBottom:'1px solid #0f0d09',cursor:'pointer'}
                    },
                      h('div',{style:{flex:1}},
                        h('div',{style:{fontSize:12,color:'#a09070',lineHeight:1.4}},item.name),
                        h('div',{style:{fontSize:10,color:'#2a2010',marginTop:1}},
                          item.cal+'cal · '+item.protein+'g P · '+item.carbs+'g C · '+item.fat+'g F')
                      ),
                      h('span',{style:{fontSize:11,color:'#2a2010'}},'✎')
                    );
              })
            ),
            // Add food
            isSrch
              ? h(FoodSearch,{
                  onAdd:f=>addItem(meal.id,f),
                  onClose:()=>setSrch(null)
                })
              : h('div',{style:{padding:'6px 14px 12px'}},
                  h('button',{
                    onClick:()=>setSrch(meal.id),
                    style:{width:'100%',background:'transparent',border:'1px dashed #221e14',
                      borderRadius:8,padding:9,color:'#504030',fontSize:10,
                      letterSpacing:'0.12em',display:'flex',alignItems:'center',justifyContent:'center',gap:6}
                  },'+ ADD FOOD')
                )
          )
        );
      })
    )
  );
}

// ── Progress Tracker ───────────────────────────────────────────────────────
function WeightChart({entries}){
  if(entries.length<2)return null;
  const vals=entries.map(e=>e.weight);
  const mn=Math.min(...vals)-2,mx=Math.max(...vals)+2;
  const W=Math.max(300,entries.length*44),H=90;
  const xS=W/(entries.length-1);
  const yS=v=>H-((v-mn)/(mx-mn))*H;
  const pts=entries.map((e,i)=>({x:i*xS,y:yS(e.weight)}));
  const path=pts.map((p,i)=>(i===0?'M':'L')+p.x.toFixed(1)+','+p.y.toFixed(1)).join(' ');
  const gY=yS(178);
  return h('div',{style:{overflowX:'auto'}},
    h('svg',{width:W,height:H+28,style:{display:'block'}},
      h('line',{x1:0,y1:gY,x2:W,y2:gY,stroke:'#1a3a1a',strokeWidth:1,strokeDasharray:'4,4'}),
      h('text',{x:4,y:gY-4,fill:'#2a5a2a',fontSize:8,fontFamily:'monospace'},'GOAL 178'),
      h('path',{d:path,fill:'none',stroke:'#a07830',strokeWidth:2,strokeLinecap:'round',strokeLinejoin:'round'}),
      pts.map((p,i)=>h('circle',{key:i,cx:p.x,cy:p.y,r:3,fill:'#a07830'})),
      entries.map((e,i)=>h('text',{key:i,x:i*xS,y:H+20,fill:'#2a2010',fontSize:8,fontFamily:'monospace',textAnchor:'middle'},
        new Date(e.date+'T12:00').toLocaleDateString('en-US',{month:'numeric',day:'numeric'})))
    )
  );
}

function ProgressTracker(){
  const[entries,setEntries]=useLS('mmp-weight',[]);
  const[w,setW]=useState('');
  const[note,setNote]=useState('');
  const[showAll,setSA]=useState(false);
  const today=new Date().toISOString().slice(0,10);
  const hasToday=entries.some(e=>e.date===today);

  function addEntry(){
    const wt=parseFloat(w);
    if(!wt||wt<100||wt>400)return;
    const entry={id:Date.now(),date:today,weight:wt,note:note.trim()};
    const sorted=[...entries.filter(e=>e.date!==today),entry].sort((a,b)=>a.date.localeCompare(b.date));
    setEntries(sorted);setW('');setNote('');
  }

  const latest=entries.length?entries[entries.length-1]:null;
  const lost=latest?+(208-latest.weight).toFixed(1):0;
  const rem=latest?+(latest.weight-178).toFixed(1):30;
  const pct=Math.min(100,Math.round(lost/30*100));
  const disp=showAll?[...entries].reverse():[...entries].reverse().slice(0,8);

  return h('div',{style:{padding:'16px 16px 0'}},
    // Stats
    h('div',{style:{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:8,marginBottom:16}},
      [['Current',latest?latest.weight:208,'lbs','#a07830'],
       ['Lost',lost>0?'-'+lost:0,'lbs','#30a030'],
       ['To Go',rem>0?rem:0,'lbs','#d06010']
      ].map(([l,v,u,col])=>
        h('div',{key:l,style:{background:'#0c0a06',border:'1px solid #181410',borderRadius:12,padding:'12px 10px',textAlign:'center'}},
          h('div',{style:{fontSize:22,color:col,letterSpacing:'-0.02em'}},v,h('span',{style:{fontSize:11,color:'#2a2010'}},u)),
          h('div',{style:{fontSize:9,color:'#2a2010',textTransform:'uppercase',letterSpacing:'0.1em',marginTop:3}},l)
        )
      )
    ),
    // Progress bar
    h('div',{style:{background:'#0c0a06',border:'1px solid #181410',borderRadius:12,padding:'14px 16px',marginBottom:16}},
      h('div',{style:{display:'flex',justifyContent:'space-between',marginBottom:8}},
        h('span',{style:{fontSize:10,color:'#504030',letterSpacing:'0.1em',textTransform:'uppercase'}},'Journey to 178'),
        h('span',{style:{fontSize:10,color:'#a07830'}},pct+'%')
      ),
      h('div',{style:{height:6,background:'#0f0d08',borderRadius:3,overflow:'hidden'}},
        h('div',{style:{height:'100%',width:pct+'%',background:'linear-gradient(90deg,#a07830,#e0a040)',borderRadius:3,transition:'width 0.5s'}})
      ),
      h('div',{style:{display:'flex',justifyContent:'space-between',marginTop:6}},
        h('span',{style:{fontSize:9,color:'#2a2010'}},'208 lbs'),
        h('span',{style:{fontSize:9,color:'#2a2010'}},'178 lbs')
      )
    ),
    // Chart
    entries.length>=2&&h('div',{style:{background:'#0c0a06',border:'1px solid #181410',borderRadius:12,padding:'14px 16px',marginBottom:16}},
      h(SLabel,{text:'Weight Trend'}),
      h(WeightChart,{entries})
    ),
    // Log weight
    h('div',{style:{background:'#0c0a06',border:'1px solid #181410',borderRadius:12,padding:'14px 16px',marginBottom:16}},
      h(SLabel,{text:hasToday?"Update Today's Weight":"Log Today's Weight"}),
      h('div',{style:{display:'flex',gap:8,marginBottom:8}},
        h('input',{type:'number',value:w,onChange:ev=>setW(ev.target.value),
          placeholder:'lbs',step:'0.1',
          style:{width:90,background:'#080604',border:'1px solid #221e14',borderRadius:8,
            padding:'10px 12px',color:'#e8e0d0',fontSize:16,outline:'none',textAlign:'center'}}),
        h('input',{value:note,onChange:ev=>setNote(ev.target.value),
          placeholder:'Note (optional)',
          style:{flex:1,background:'#080604',border:'1px solid #221e14',borderRadius:8,
            padding:'10px 12px',color:'#a09070',fontSize:12,outline:'none'}})
      ),
      h('button',{
        onClick:addEntry,
        style:{width:'100%',background:'#122a0a',border:'1px solid #1e4a10',borderRadius:8,
          padding:10,color:'#50c040',fontSize:10,cursor:'pointer',letterSpacing:'0.1em'}
      },hasToday?'UPDATE ENTRY':'LOG WEIGHT')
    ),
    // History
    entries.length>0&&h('div',{style:{background:'#0c0a06',border:'1px solid #181410',borderRadius:12,padding:'14px 16px',marginBottom:16}},
      h(SLabel,{text:'History'}),
      disp.map((e,i)=>{
        const prev=entries[entries.length-1-i-1];
        const delta=prev?+(e.weight-prev.weight).toFixed(1):null;
        const isT=e.date===today;
        return h('div',{key:e.id,style:{display:'flex',alignItems:'center',padding:'8px 0',borderBottom:'1px solid #181410'}},
          h('div',{style:{flex:1}},
            h('div',{style:{display:'flex',alignItems:'center',gap:8}},
              h('span',{style:{fontSize:13,color:isT?'#a07830':'#a09070'}},e.weight+' lbs'),
              delta!==null&&h('span',{style:{fontSize:10,color:delta<0?'#30a030':delta>0?'#e05030':'#2a2010'}},(delta>0?'+':'')+delta),
              isT&&h('span',{style:{fontSize:9,color:'#a07830',letterSpacing:'0.1em'}},'TODAY')
            ),
            e.note&&h('div',{style:{fontSize:11,color:'#504030',marginTop:2}},e.note)
          ),
          h('span',{style:{fontSize:10,color:'#2a2010'}},
            new Date(e.date+'T12:00').toLocaleDateString('en-US',{month:'short',day:'numeric'}))
        );
      }),
      entries.length>8&&h('button',{
        onClick:()=>setSA(!showAll),
        style:{marginTop:8,background:'transparent',border:'none',color:'#504030',fontSize:11,cursor:'pointer',letterSpacing:'0.1em'}
      },showAll?'Show less ▲':'Show all '+entries.length+' ▼')
    ),
    h('div',{style:{height:20}})
  );
}

// ── Workout Logger ─────────────────────────────────────────────────────────
const WT=[
  {id:'strength',label:'Strength',emoji:'🏋️',color:'#4080c0'},
  {id:'cardio',label:'Cardio',emoji:'🏃',color:'#30a030'},
  {id:'hiit',label:'HIIT',emoji:'⚡',color:'#d06010'},
  {id:'swim',label:'Swim',emoji:'🏊',color:'#20a0c0'},
  {id:'yoga',label:'Yoga/Flex',emoji:'🧘',color:'#8060c0'},
  {id:'rest',label:'Rest Day',emoji:'😴',color:'#504030'},
];
const INTENS=['Easy','Moderate','Hard','Max'];

function WorkoutLogger(){
  const[logs,setLogs]=useLS('mmp-workouts',[]);
  const[type,setType]=useState('strength');
  const[intens,setIntens]=useState(1);
  const[dur,setDur]=useState('');
  const[notes,setNotes]=useState('');
  const[showAll,setSA]=useState(false);
  const today=new Date().toISOString().slice(0,10);
  const todayLog=logs.find(l=>l.date===today);

  function logWorkout(){
    const entry={id:Date.now(),date:today,type,intensity:intens,duration:parseInt(dur)||0,notes:notes.trim()};
    const sorted=[...logs.filter(l=>l.date!==today),entry].sort((a,b)=>a.date.localeCompare(b.date));
    setLogs(sorted);setNotes('');
  }

  const weekDates=DAYS.map((_,i)=>{
    const d=new Date();const jd=d.getDay();const off=jd===0?-6:1-jd;
    const nd=new Date(d);nd.setDate(d.getDate()+off+i);return nd.toISOString().slice(0,10);
  });

  const streak=(()=>{
    let s=0;
    const sorted=[...logs].sort((a,b)=>b.date.localeCompare(a.date));
    for(const l of sorted){
      if(l.type==='rest')continue;
      const ex=new Date();ex.setDate(ex.getDate()-s);
      if(l.date===ex.toISOString().slice(0,10))s++;else break;
    }
    return s;
  })();

  const wkTotal=weekDates.filter(d=>logs.find(l=>l.date===d&&l.type!=='rest')).length;
  const total=logs.filter(l=>l.type!=='rest').length;
  const disp=showAll?[...logs].reverse():[...logs].reverse().slice(0,10);
  const wt2=WT.find(w=>w.id===type);

  return h('div',{style:{padding:'16px 16px 0'}},
    // Stats
    h('div',{style:{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:8,marginBottom:16}},
      [['Streak',streak,'days','#a07830'],['Total',total,'sessions','#4080c0'],['This Wk',wkTotal,'/7','#30a030']].map(([l,v,u,col])=>
        h('div',{key:l,style:{background:'#0c0a06',border:'1px solid #181410',borderRadius:12,padding:'12px 10px',textAlign:'center'}},
          h('div',{style:{fontSize:22,color:col,letterSpacing:'-0.02em'}},v,h('span',{style:{fontSize:11,color:'#2a2010'}},u)),
          h('div',{style:{fontSize:9,color:'#2a2010',textTransform:'uppercase',letterSpacing:'0.1em',marginTop:3}},l)
        )
      )
    ),
    // Weekly strip
    h('div',{style:{background:'#0c0a06',border:'1px solid #181410',borderRadius:12,padding:'14px 16px',marginBottom:16}},
      h(SLabel,{text:'This Week'}),
      h('div',{style:{display:'grid',gridTemplateColumns:'repeat(7,1fr)',gap:5}},
        DAYS.map((d,i)=>{
          const date=weekDates[i];
          const lg=logs.find(l=>l.date===date);
          const hi=DTYPES[i]==='high';
          const isT=date===today;
          const wtype=WT.find(w=>w.id===(lg&&lg.type));
          return h('div',{key:d,style:{textAlign:'center'}},
            h('div',{style:{fontSize:8,color:isT?'#a07830':'#2a2010',marginBottom:4}},d),
            h('div',{style:{
              width:'100%',paddingBottom:'100%',position:'relative',borderRadius:8,
              background:lg?(lg.type==='rest'?'#141008':'#0a1a0a'):'#0c0a06',
              border:'1px solid '+(lg?(lg.type==='rest'?'#2a2008':'#1a3a1a'):isT?'#221e14':'#181410')
            }},
              h('div',{style:{position:'absolute',inset:0,display:'flex',alignItems:'center',justifyContent:'center',fontSize:14}},
                lg?(wtype&&wtype.emoji):(hi?'🔥':''))
            ),
            hi&&!lg&&h('div',{style:{fontSize:7,color:'#502010',marginTop:2}},'HI-C')
          );
        })
      )
    ),
    // Log workout
    h('div',{style:{background:'#0c0a06',border:'1px solid #181410',borderRadius:12,padding:'14px 16px',marginBottom:16}},
      h(SLabel,{text:todayLog?"Update Today's Workout":"Log Today's Workout"}),
      h('div',{style:{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:6,marginBottom:12}},
        WT.map(w=>h('button',{
          key:w.id,onClick:()=>setType(w.id),
          style:{background:type===w.id?'#0a1a0a':'transparent',
            border:'1px solid '+(type===w.id?w.color:'#181410'),
            borderRadius:8,padding:'9px 6px',textAlign:'center'}
        },
          h('div',{style:{fontSize:18,marginBottom:2}},w.emoji),
          h('div',{style:{fontSize:9,color:type===w.id?w.color:'#2a2010',letterSpacing:'0.08em'}},w.label)
        ))
      ),
      type!=='rest'&&h('div',null,
        h('div',{style:{marginBottom:10}},
          h('div',{style:{fontSize:9,color:'#2a2010',letterSpacing:'0.12em',textTransform:'uppercase',marginBottom:6}},'Intensity'),
          h('div',{style:{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:5}},
            INTENS.map((s,idx)=>h('button',{
              key:s,onClick:()=>setIntens(idx),
              style:{background:intens===idx?'#0a1a0a':'transparent',
                border:'1px solid '+(intens===idx?'#30a030':'#181410'),
                borderRadius:7,padding:'7px 4px',fontSize:10,
                color:intens===idx?'#30a030':'#2a2010',letterSpacing:'0.06em'}
            },s))
          )
        ),
        h('div',{style:{marginBottom:10}},
          h('div',{style:{fontSize:9,color:'#2a2010',letterSpacing:'0.12em',textTransform:'uppercase',marginBottom:6}},'Duration (min)'),
          h('input',{type:'number',value:dur,onChange:ev=>setDur(ev.target.value),placeholder:'45',
            style:{width:'100%',boxSizing:'border-box',background:'#080604',border:'1px solid #221e14',borderRadius:8,
              padding:'10px 12px',color:'#e8e0d0',fontSize:16,outline:'none',textAlign:'center'}})
        )
      ),
      h('div',{style:{marginBottom:12}},
        h('div',{style:{fontSize:9,color:'#2a2010',letterSpacing:'0.12em',textTransform:'uppercase',marginBottom:6}},'Notes'),
        h('textarea',{value:notes,onChange:ev=>setNotes(ev.target.value),
          placeholder:'What did you do? How did it feel?',rows:2,
          style:{width:'100%',boxSizing:'border-box',background:'#080604',border:'1px solid #221e14',borderRadius:8,
            padding:'10px 12px',color:'#a09070',fontSize:12,outline:'none',resize:'none',lineHeight:1.5}})
      ),
      h('button',{
        onClick:logWorkout,
        style:{width:'100%',background:'#122a0a',border:'1px solid #1e4a10',borderRadius:8,
          padding:10,color:'#50c040',fontSize:10,cursor:'pointer',letterSpacing:'0.1em'}
      },todayLog?'UPDATE WORKOUT':'LOG '+(wt2?wt2.label.toUpperCase():'WORKOUT'))
    ),
    // History
    logs.length>0&&h('div',{style:{background:'#0c0a06',border:'1px solid #181410',borderRadius:12,padding:'14px 16px',marginBottom:16}},
      h(SLabel,{text:'History'}),
      disp.map(lg=>{
        const wt3=WT.find(w=>w.id===lg.type);
        const isT=lg.date===today;
        return h('div',{key:lg.id,style:{display:'flex',alignItems:'center',gap:10,padding:'9px 0',borderBottom:'1px solid #181410'}},
          h('span',{style:{fontSize:20}},wt3&&wt3.emoji),
          h('div',{style:{flex:1}},
            h('div',{style:{display:'flex',alignItems:'center',gap:8}},
              h('span',{style:{fontSize:13,color:isT?'#a07830':'#a09070'}},wt3&&wt3.label),
              lg.type!=='rest'&&lg.duration>0&&h('span',{style:{fontSize:10,color:'#504030'}},lg.duration+'min'),
              lg.type!=='rest'&&h('span',{style:{fontSize:9,color:(wt3&&wt3.color)||'#2a2010'}},INTENS[lg.intensity]),
              isT&&h('span',{style:{fontSize:9,color:'#a07830',letterSpacing:'0.1em'}},'TODAY')
            ),
            lg.notes&&h('div',{style:{fontSize:11,color:'#504030',marginTop:2}},lg.notes)
          ),
          h('span',{style:{fontSize:10,color:'#2a2010',flexShrink:0}},
            new Date(lg.date+'T12:00').toLocaleDateString('en-US',{month:'short',day:'numeric'}))
        );
      }),
      logs.length>10&&h('button',{
        onClick:()=>setSA(!showAll),
        style:{marginTop:8,background:'transparent',border:'none',color:'#504030',fontSize:11,cursor:'pointer',letterSpacing:'0.1em'}
      },showAll?'Show less ▲':'Show all '+logs.length+' ▼')
    ),
    h('div',{style:{height:20}})
  );
}

// ── App Shell ──────────────────────────────────────────────────────────────
const TABS=[{id:'meals',label:'Meals',icon:'🥗'},{id:'progress',label:'Progress',icon:'📉'},{id:'workout',label:'Workout',icon:'🏋️'}];

function App(){
  const[tab,setTab]=useState('meals');
  return h('div',{className:'app'},
    h('div',{className:'header'},
      h('div',{className:'header-inner'},
        h('div',null,
          h('div',{className:'app-name'},'My Macro Planner'),
          h('div',{className:'app-title'},'Cut to 178')
        ),
        h('div',null,
          h('div',{className:'target-label'},'Target'),
          h('div',{className:'target-val'},'-30 lbs')
        )
      )
    ),
    h('div',{className:'content'},
      tab==='meals'&&h(MealPlanner,null),
      tab==='progress'&&h(ProgressTracker,null),
      tab==='workout'&&h(WorkoutLogger,null)
    ),
    h('div',{className:'bottom-nav'},
      TABS.map(t=>{
        const active=tab===t.id;
        return h('button',{key:t.id,className:'nav-btn',onClick:()=>setTab(t.id)},
          h('span',{className:'nav-icon',style:{opacity:active?1:0.35}},t.icon),
          h('span',{className:'nav-label',style:{color:active?'#a07830':'#2a2010'}},t.label),
          active&&h('div',{className:'nav-dot'})
        );
      })
    )
  );
}

// Mount
const root=ReactDOM.createRoot(document.getElementById('root'));
root.render(h(App,null));

})();
</script>
